<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elderly Care - (15 FUNC ALL-IN-ONE)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --bg: #F8FAFC; --primary: #3B82F6; --danger: #EF4444; --success: #10B981; --warning: #F59E0B; --text: #0F172A; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; user-select: none; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; padding-bottom: 160px; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .btn-start { background: white; color: var(--primary); border: none; padding: 40px 80px; border-radius: 40px; font-size: 50px; font-weight: 900; box-shadow: 0 15px 0 #1E3A8A; cursor: pointer; }

        /* Header (ตื่นนอน + Medical ID + นาฬิกา) */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-morning { background: linear-gradient(135deg, #F59E0B, #D97706); color: white; border: none; padding: 20px 30px; border-radius: 25px; font-size: 30px; font-weight: 900; box-shadow: 0 10px 0 #92400E; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .btn-medical { background: #EF4444; color: white; border: none; padding: 20px; border-radius: 50%; font-size: 36px; box-shadow: 0 8px 0 #991B1B; cursor: pointer; width: 85px; height: 85px; display: flex; justify-content: center; align-items: center;}
        .clock-time { font-size: 50px; font-weight: 900; color: var(--primary); line-height: 1;}

        /* Walkie-Talkie */
        .btn-walkie { width: 100%; background: #8B5CF6; color: white; border: none; padding: 30px; border-radius: 25px; font-size: 36px; font-weight: 900; box-shadow: 0 12px 0 #5B21B6; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 20px; cursor: pointer; transition: 0.2s; }
        .btn-walkie:active { transform: translateY(10px); box-shadow: none; }
        .btn-walkie.recording { background: #EF4444; box-shadow: 0 12px 0 #991B1B; animation: pulse 1s infinite; }

        /* Layout Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 4px solid #E2E8F0; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .card-wide { grid-column: span 2; }
        .card-title { font-size: 26px; font-weight: 900; margin-bottom: 20px; color: var(--text); }

        /* น้ำ & ยา */
        .water-glass { width: 100px; height: 120px; border: 6px solid #38BDF8; border-top: none; border-radius: 0 0 25px 25px; position: relative; overflow: hidden; margin: 15px auto; cursor: pointer; }
        .water-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(56, 189, 248, 0.5); transition: 0.5s; }
        .water-glass.thirsty { border-color: var(--danger); animation: shake 1s infinite; }
        
        .btn-pill { background: #10B981; color: white; border: none; padding: 20px; border-radius: 20px; font-size: 26px; font-weight: 900; box-shadow: 0 8px 0 #059669; cursor: pointer; width: 100%; margin-top: 15px;}
        .btn-pill:active { transform: translateY(8px); box-shadow: none; }

        /* อารมณ์ */
        .mood-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
        .mood-btn { background: #F8FAFC; border: 4px solid #CBD5E1; border-radius: 20px; padding: 20px 5px; font-size: 22px; font-weight: 900; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .mood-btn.active { background: #DBEAFE; border-color: #3B82F6; }

        /* นัด & รูป */
        .photo-frame { width: 100%; height: 200px; border-radius: 20px; background-size: cover; background-position: center; border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); background-image: url('https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=800&q=80');}

        /* เกม & เพลง */
        .btn-entertain { width: 100%; color: white; border: none; padding: 20px; border-radius: 20px; font-size: 26px; font-weight: 900; cursor: pointer; }

        /* SOS Bottom Bar */
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 50; border-top: 4px solid #E2E8F0; }
        .btn-sos { width: 100%; background: linear-gradient(135deg, #EF4444, #B91C1C); color: white; border: none; padding: 30px; border-radius: 30px; font-size: 40px; font-weight: 900; box-shadow: 0 12px 0 #7F1D1D; cursor: pointer; animation: pulse 2s infinite; }
        
        /* Overlays */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; }
        #sos-cancel-screen { background: rgba(239, 68, 68, 0.98); color: white; }
        #alarm-screen { background: rgba(245, 158, 11, 0.98); color: white; }
        #video-screen, #dharma-screen, #medical-screen, #game-screen { background: #0F172A; }
        #jitsi-container { width: 100%; flex-grow: 1; }

        /* Game Board */
        #game-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 500px; margin-top: 20px;}
        .memory-card { background: #3B82F6; border-radius: 15px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; border: none; box-shadow: 0 6px 0 #1E3A8A; color: transparent; transition: 0.3s; }
        .memory-card.flipped { background: white; border: 4px solid #3B82F6; color: initial; box-shadow: 0 4px 0 #94A3B8; transform: translateY(4px); }
        .memory-card.matched { background: #10B981; border-color: #059669; color: initial; pointer-events: none; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div id="start-overlay"><i class="fa-solid fa-hand-pointer fa-bounce" style="font-size: 150px; margin-bottom: 50px;"></i><button class="btn-start" onclick="initSystem()">แตะเพื่อเปิดระบบทั้งหมด</button></div>

    <div id="medical-screen" class="overlay">
        <div style="width: 100%; max-width: 600px; background: white; border-radius: 40px; padding: 40px; color: var(--text);">
            <i class="fa-solid fa-notes-medical" style="font-size: 80px; color: var(--danger); margin-bottom: 20px;"></i>
            <h1 style="font-size: 40px; font-weight: 900; margin-bottom: 20px;">ข้อมูลการแพทย์ฉุกเฉิน</h1>
            <p id="medical-info" style="font-size: 28px; font-weight: 600; background: #FEF2F2; padding: 20px; border-radius: 20px; border: 4px solid #FCA5A5; text-align: left;"></p>
            <button onclick="document.getElementById('medical-screen').style.display='none'" style="margin-top: 30px; background: var(--primary); color: white; border: none; padding: 20px 50px; border-radius: 25px; font-size: 30px; font-weight: 900;">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="sos-cancel-screen" class="overlay">
        <h1 style="font-size: 50px; font-weight: 900;">ส่งสัญญาณฉุกเฉินใน</h1>
        <div style="font-size: 180px; font-weight: 900; margin: 20px 0;" id="sos-counter">5</div>
        <button onclick="cancelSOS()" style="background: white; color: #EF4444; border: none; padding: 30px 80px; border-radius: 40px; font-size: 50px; font-weight: 900; box-shadow: 0 15px 0 #FCA5A5;">ยกเลิก</button>
    </div>

    <div id="alarm-screen" class="overlay">
        <i class="fa-solid fa-bullhorn fa-shake" style="font-size: 150px; margin-bottom: 40px;"></i>
        <h1 id="alarm-text" style="font-size: 50px; font-weight: 900; margin-bottom: 50px; line-height: 1.3;">-</h1>
        <button onclick="document.getElementById('alarm-screen').style.display='none'" style="background: white; color: #D97706; border: none; padding: 30px 60px; border-radius: 30px; font-size: 40px; font-weight: 900;">รับทราบครับ</button>
    </div>

    <div id="video-screen" class="overlay" style="padding:0;">
        <div style="width: 100%; padding: 20px; background: #1E293B; color: white; font-size: 26px; font-weight: 900; text-align: left;"><i class="fa-solid fa-video"></i> กำลังคุยกับลูกหลาน</div>
        <div id="jitsi-container"></div>
    </div>

    <div id="dharma-screen" class="overlay" style="padding:0;">
        <div style="width: 100%; padding: 20px; background: #1E293B; color: white; font-size: 26px; font-weight: 900; display: flex; justify-content: space-between; align-items: center;">
            <span><i class="fa-solid fa-radio"></i> ฟังเพลง / ธรรมะ</span>
            <button onclick="closeDharma()" style="background: #EF4444; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 20px; font-weight: 900;">ปิด</button>
        </div>
        <iframe id="yt-player" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div id="game-screen" class="overlay">
        <div style="width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #1E293B;">
            <span style="color: white; font-size: 26px; font-weight: 900;">เกมฝึกสมอง</span>
            <button onclick="document.getElementById('game-screen').style.display='none'" style="background: #EF4444; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 20px; font-weight: 900;">เลิกเล่น</button>
        </div>
        <div id="game-board"></div>
    </div>

    <div class="header">
        <div style="display: flex; gap: 15px;">
            <button class="btn-morning" id="btn-morning" onclick="morningCheckin()"><i class="fa-solid fa-sun"></i> ตื่นแล้ว</button>
            <button class="btn-medical" onclick="document.getElementById('medical-screen').style.display='flex'"><i class="fa-solid fa-notes-medical"></i></button>
        </div>
        <div class="clock-time" id="clock-time">00:00</div>
    </div>

    <button class="btn-walkie" id="btn-walkie" onmousedown="startVoiceRecord()" onmouseup="stopVoiceRecord()" ontouchstart="startVoiceRecord()" ontouchend="stopVoiceRecord()">
        <i class="fa-solid fa-microphone"></i> กดค้างเพื่อฝากข้อความเสียง
    </button>

    <div class="grid-2">
        <div class="card" onclick="drinkWater()">
            <div class="card-title" style="color: #0284C7; margin-bottom: 5px;">ดื่มน้ำ <span id="water-text" style="font-size:16px;">(0 แก้ว)</span></div>
            <div class="water-glass" id="water-glass"><div class="water-fill" id="water-fill"></div></div>
        </div>
        
        <div class="card" style="background: #FEF3C7; border-color: #FCD34D;">
            <div class="card-title" style="color: #92400E; margin-bottom: 5px;">ตารางยา</div>
            <p id="pill-desc" style="font-size: 20px; font-weight: 700; color: #9A3412;">กำลังโหลด...</p>
            <button class="btn-pill" id="btn-pill" onclick="executeAction('pill', 'กินยาเรียบร้อย')"><i class="fa-solid fa-check"></i> กินแล้ว</button>
        </div>

        <div class="card card-wide">
            <div class="card-title"><i class="fa-solid fa-face-smile" style="color: #3B82F6;"></i> วันนี้รู้สึกอย่างไรบ้าง?</div>
            <div class="mood-grid">
                <button class="mood-btn" onclick="sendMood(this, '😁 สบายดี')"><span style="font-size: 40px;">😁</span>สบายดี</button>
                <button class="mood-btn" onclick="sendMood(this, '🤒 ปวดเมื่อย')"><span style="font-size: 40px;">🤒</span>ปวดเมื่อย</button>
                <button class="mood-btn" onclick="sendMood(this, '😢 เหงาจัง')"><span style="font-size: 40px;">😢</span>เหงาจัง</button>
            </div>
        </div>

        <div class="card" style="background: #E0E7FF; border-color: #818CF8;">
            <div class="card-title" style="color: #4F46E5;">นัดหมอครั้งถัดไป</div>
            <div id="appoint-desc" style="font-size: 20px; font-weight: 900; color: #1E3A8A;">กำลังโหลด...</div>
        </div>

        <div class="card" style="padding: 10px;">
            <div class="photo-frame" id="gallery-frame"></div>
        </div>

        <button class="btn-entertain" style="background: #D946EF; box-shadow: 0 8px 0 #BE185D;" onclick="openGame()"><i class="fa-solid fa-brain"></i> เล่นเกมจับคู่</button>
        <button class="btn-entertain" style="background: #0EA5E9; box-shadow: 0 8px 0 #0284C7;" onclick="document.getElementById('dharma-screen').style.display='flex'; document.getElementById('yt-player').src='https://www.youtube.com/embed/videoseries?list=PLB5A6513A5C59F9F8&autoplay=1';"><i class="fa-solid fa-radio"></i> ฟังวิทยุ/ธรรมะ</button>
    </div>

    <div class="bottom-bar">
        <button class="btn-sos" onclick="triggerSOS()"><i class="fa-solid fa-triangle-exclamation"></i> แจ้งเหตุฉุกเฉินด่วน!</button>
    </div>

    <audio id="water-sound" src="https://actions.google.com/sounds/v1/water/pouring_water.ogg"></audio>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8enGt2JJA8RwqoyX4xcQXGjpDBVpGly5QKxM_WrR5hMJqEW2gJu_rCL6063BNXPY/exec";
        const TOPIC = "familycare_all_in_one_123/";
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        
        let audioEnabled = false, jitsiApi = null, sosTimer = null, sosCountdown = 5;
        let waterCount = 0, waterTimer = null, recognition = null;
        
        setInterval(() => { document.getElementById('clock-time').innerText = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}); }, 1000);

        function initSystem() {
            document.getElementById('start-overlay').style.display = 'none'; audioEnabled = true;
            speakThai("ระบบทั้ง 15 ฟังก์ชัน พร้อมทำงานแล้วครับ");
            fetchGASData(); startWaterReminder(); initSpeech();
        }

        function speakThai(text) { if(audioEnabled && 'speechSynthesis' in window) { window.speechSynthesis.cancel(); let msg = new SpeechSynthesisUtterance(text); msg.lang = 'th-TH'; msg.rate = 0.9; window.speechSynthesis.speak(msg); } }

        // --- MQTT ---
        client.on('connect', () => { setInterval(() => { client.publish(TOPIC + 'elderly/heartbeat', 'online'); }, 5000); client.subscribe(TOPIC + 'admin/#'); });
        client.on('message', (topic, message) => {
            const action = topic.split('/').pop(); const msg = message.toString();
            if (action === 'intercom') { document.getElementById('alarm-text').innerText = msg; document.getElementById('alarm-screen').style.display = 'flex'; speakThai(msg); } 
            else if (action === 'ping_update') { fetchGASData(); }
            else if (action === 'video') {
                if (msg === 'start') {
                    speakThai("ลูกหลานกำลังเปิดกล้องครับ"); document.getElementById('video-screen').style.display = 'flex';
                    if(!jitsiApi) jitsiApi = new JitsiMeetExternalAPI('meet.jit.si', { roomName: 'FamilyCare_AllInOne_888', width: '100%', height: '100%', parentNode: document.querySelector('#jitsi-container'), userInfo: { displayName: 'คุณตา' }, interfaceConfigOverwrite: { TOOLBAR_BUTTONS: [] } });
                } else if (msg === 'stop') { if(jitsiApi) { jitsiApi.dispose(); jitsiApi = null; } document.getElementById('video-screen').style.display = 'none'; speakThai("วางสายแล้วครับ"); }
            }
        });

        // --- Walkie Talkie ---
        function initSpeech() {
            if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
                recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); recognition.lang = 'th-TH'; recognition.interimResults = false;
                recognition.onresult = (e) => { const text = e.results[0][0].transcript; speakThai("ส่งข้อความว่า " + text); client.publish(TOPIC + 'elderly/voice_msg', text); executeAction('voice_msg', text); };
            }
        }
        function startVoiceRecord() { if(!recognition) return; document.getElementById('btn-walkie').classList.add('recording'); document.getElementById('btn-walkie').innerHTML = '<i class="fa-solid fa-ear-listen fa-beat"></i> กำลังฟัง... พูดเลยครับ'; recognition.start(); }
        function stopVoiceRecord() { setTimeout(() => { document.getElementById('btn-walkie').classList.remove('recording'); document.getElementById('btn-walkie').innerHTML = '<i class="fa-solid fa-microphone"></i> กดค้างเพื่อฝากข้อความเสียง'; recognition.stop(); }, 1000); }

        // --- Water Tracker ---
        function startWaterReminder() {
            clearTimeout(waterTimer); document.getElementById('water-glass').classList.remove('thirsty');
            waterTimer = setTimeout(() => { document.getElementById('water-glass').classList.add('thirsty'); speakThai("คุณตาครับ ได้เวลาดื่มน้ำสักแก้วแล้วครับ"); }, 7200000); 
        }
        function drinkWater() {
            document.getElementById('water-sound').play(); waterCount++; document.getElementById('water-text').innerText = "(" + waterCount + " แก้ว)";
            let fill = document.getElementById('water-fill'); fill.style.height = "100%"; setTimeout(() => { fill.style.height = "0%"; }, 1000);
            startWaterReminder(); executeAction('water_drink', 'ดื่มน้ำ');
        }

        // --- GAS & Actions ---
        function morningCheckin() { let btn = document.getElementById('btn-morning'); btn.innerHTML = '<i class="fa-solid fa-sun"></i> ตื่นแล้ว'; btn.disabled = true; btn.style.background = "#10B981"; speakThai("อรุณสวัสดิ์ครับ แจ้งลูกหลานแล้ว"); executeAction('morning_checkin', 'ตื่นแล้ว'); }
        function closeDharma() { document.getElementById('dharma-screen').style.display='none'; document.getElementById('yt-player').src=''; }

        function triggerSOS() {
            document.getElementById('sos-cancel-screen').style.display = 'flex'; sosCountdown = 5; document.getElementById('sos-counter').innerText = sosCountdown; speakThai("ส่งสัญญาณใน 5 4 3 2 1");
            sosTimer = setInterval(() => { sosCountdown--; document.getElementById('sos-counter').innerText = sosCountdown; if(sosCountdown <= 0) { clearInterval(sosTimer); executeSOS(); } }, 1000);
        }
        function cancelSOS() { clearInterval(sosTimer); document.getElementById('sos-cancel-screen').style.display = 'none'; speakThai("ยกเลิกแล้วครับ"); }
        function executeSOS() {
            document.getElementById('sos-cancel-screen').style.display = 'none'; speakThai("ส่งพิกัดแล้วครับ");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "sos", lat: pos.coords.latitude, lng: pos.coords.longitude }), headers: { "Content-Type": "text/plain;charset=utf-8" }}); client.publish(TOPIC + 'elderly/sos', 'EMERGENCY'); }, async () => { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "sos", lat: 0, lng: 0 }), headers: { "Content-Type": "text/plain;charset=utf-8" }}); client.publish(TOPIC + 'elderly/sos', 'EMERGENCY'); }, { enableHighAccuracy: true, timeout: 10000 });
            }
        }

        async function fetchGASData() {
            try {
                const res = await fetch(SCRIPT_URL); const result = await res.json();
                if (result.status === "success") {
                    let d = result.data;
                    document.getElementById('medical-info').innerHTML = d.medicalId.replace(/\n/g, '<br>');
                    if(d.morningCheckin) { let btn = document.getElementById('btn-morning'); btn.innerHTML = '<i class="fa-solid fa-sun"></i> ตื่นแล้ว'; btn.disabled = true; btn.style.background = "#10B981"; }
                    if(d.familyCheckin) document.getElementById('checkin-status').innerHTML = '<i class="fa-solid fa-circle-check" style="color:#10B981;"></i> ลูกหลานมาหาแล้ว!';
                    document.getElementById('pill-desc').innerText = d.latestPill.replace("ตารางยา: ", "");
                    document.getElementById('appoint-desc').innerText = d.latestAppoint.replace("นัดหมอ: ", "");
                    if(d.latestPhoto) document.getElementById('gallery-frame').style.backgroundImage = `url('${d.latestPhoto.replace("รูปภาพ: ", "")}')`;
                }
            } catch(e) {}
        }

        async function executeAction(action, logText) {
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: action, details: logText }), headers: { "Content-Type": "text/plain;charset=utf-8" }});
                client.publish(TOPIC + 'elderly/ping_update', 'done');
                if(action === 'pill') { let btn = document.getElementById('btn-pill'); btn.disabled = true; btn.style.background = "#94A3B8"; btn.innerHTML = '<i class="fa-solid fa-check-double"></i> บันทึกแล้ว'; speakThai("เก่งมากครับ"); }
            } catch(e) {}
        }

        function sendMood(btn, mood) { document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); client.publish(TOPIC + 'elderly/ping_update', 'done'); executeAction('mood', mood); speakThai("บอกลูกหลานว่า" + mood); }

        // --- เกมจับคู่ ---
        let cards = ['🍎','🍎','🐶','🐶','🚗','🚗','🍉','🍉'], fCard = null, sCard = null, matches = 0, locked = false;
        function openGame() { speakThai("หาภาพที่เหมือนกันให้เจอนะครับ"); document.getElementById('game-screen').style.display = 'flex'; initGame(); }
        function initGame() { const b = document.getElementById('game-board'); b.innerHTML = ''; cards.sort(() => 0.5 - Math.random()); matches = 0; fCard = null; sCard = null; locked = false; cards.forEach(c => { let btn = document.createElement('button'); btn.className = 'memory-card'; btn.dataset.val = c; btn.onclick = () => flipCard(btn); b.appendChild(btn); }); }
        function flipCard(card) {
            if(locked || card === fCard || card.classList.contains('matched')) return;
            card.classList.add('flipped'); card.innerText = card.dataset.val;
            if(!fCard) { fCard = card; return; } sCard = card; locked = true;
            if(fCard.dataset.val === sCard.dataset.val) {
                fCard.classList.add('matched'); sCard.classList.add('matched'); matches++; speakThai("เก่งมากครับ");
                if(matches === 4) setTimeout(() => { speakThai("คุณตาชนะแล้ว"); alert("ชนะแล้ว! 🎉"); initGame(); }, 500); [fCard, sCard, locked] = [null, null, false];
            } else { setTimeout(() => { fCard.classList.remove('flipped'); fCard.innerText = ''; sCard.classList.remove('flipped'); sCard.innerText = ''; [fCard, sCard, locked] = [null, null, false]; }, 1000); }
        }
    </script>
</body>
