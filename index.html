<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family App (OriginOS V.5)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* CSS เหมือนเดิม ข้ามไปส่วน Form */
        :root { --bg: #040914; --card: rgba(20, 27, 45, 0.65); --primary: #0EA5E9; --primary-grad: linear-gradient(135deg, #0EA5E9, #3B82F6); --success: #10B981; --text: #F8FAFC; --danger: #EF4444; --danger-grad: linear-gradient(135deg, #EF4444, #B91C1C); --warning: #F59E0B;}
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; outline: none; -webkit-tap-highlight-color: transparent;}
        body { background: var(--bg); background-image: radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.15) 0%, transparent 60%); color: var(--text); padding: 20px; overflow-x: hidden; position: relative;}
        .glass { background: var(--card); backdrop-filter: blur(30px) saturate(150%); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 32px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); }

        .auth-container { max-width: 500px; margin: 40px auto; padding: 40px; text-align: center; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; margin-top: 20px; display: none; border: 3px solid var(--primary);}
        
        #main-dashboard, #paywall-screen { display: none; }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .card { padding: 35px; }
        .card-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
        .status-badge { background: rgba(0,0,0,0.5); padding: 10px 18px; border-radius: 30px; font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.1); }
        
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 30px;}
        .stat-box { background: rgba(0,0,0,0.3); padding: 25px; border-radius: 24px; display: flex; flex-direction: column; gap: 8px; font-size: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }

        .form-group { margin-bottom: 20px; text-align: left;}
        label { display: block; margin-bottom: 10px; color: #94A3B8; font-size: 1rem; font-weight: 600;}
        input[type="text"], input[type="password"], input[type="number"], input[type="date"], select { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; font-size: 1.1rem; margin-bottom: 15px; transition: 0.3s;}
        input:focus { border-color: var(--primary); background: rgba(0,0,0,0.6);}
        
        .btn { padding: 18px 26px; border-radius: 20px; border: none; font-size: 1.15rem; font-weight: bold; cursor: pointer; color: white; display: inline-flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; }
        .btn:active { transform: scale(0.92); }
        
        /* 🔴 ปรับแต่งตารางยาและนัดหมายให้ดีขึ้น */
        .list-manager { background: rgba(0,0,0,0.3); padding: 25px; border-radius: 24px; margin-bottom: 20px;}
        .list-item { display: flex; justify-content: space-between; background: rgba(255,255,255,0.08); padding: 15px 20px; border-radius: 16px; margin-bottom: 12px; align-items: center;}
        
        /* Checkbox ยา */
        .time-checks { display: flex; gap: 10px; margin-bottom: 15px; }
        .time-checks label { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; margin:0; cursor: pointer; background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 10px;}
        .time-checks input { width: auto; margin:0;}

        .log-container { background: rgba(0,0,0,0.3); border-radius: 24px; padding: 25px; max-height: 280px; overflow-y: auto;}
        .log-item { display: flex; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 15px 0; align-items: center;}
        .log-time { color: var(--sub); font-size: 0.95rem; width: 65px;}
        .log-msg { color: white; font-size: 1.05rem; flex: 1;}

        #sos-alert { display: none; background: var(--danger-grad); color: white; padding: 30px; border-radius: 28px; margin-bottom: 30px; justify-content: space-between; align-items: center; grid-column: 1 / -1; animation: pulse 1.5s infinite;}
        #geofence-alert { display: none; background: linear-gradient(135deg, #F59E0B, #D97706); color: black; padding: 30px; border-radius: 28px; margin-bottom: 30px; grid-column: 1 / -1; font-weight: bold;}
        #map { height: 320px; border-radius: 24px; border: 2px solid rgba(255,255,255,0.1); display: block; margin-top: 20px; }
        
        .toast-container { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 16px 30px; border-radius: 50px; font-weight: 600; display: flex; align-items: center; gap: 12px; animation: slideDown 0.5s forwards; }
        .toast.success { border-left: 5px solid var(--success); } .toast.error { border-left: 5px solid var(--danger); }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUpFade { to { opacity: 0; transform: translateY(-40px); } }

        .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); z-index: 10001; display: flex; justify-content: center; align-items: center; opacity: 0; transition: 0.4s; pointer-events: none;}
        .confirm-overlay.show { opacity: 1; pointer-events: auto;}
        .confirm-box { background: rgba(20, 27, 45, 0.95); padding: 40px; border-radius: 36px; width: 90%; max-width: 420px; text-align: center; border: 1px solid rgba(255,255,255,0.15); transform: scale(0.8); transition: 0.4s;}
        .confirm-overlay.show .confirm-box { transform: scale(1); }
        
        .upload-btn-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .upload-btn-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%;}
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); } 70% { box-shadow: 0 0 0 20px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
    </style>
</head>
<body>

    <div id="toast-container" class="toast-container"></div>
    <div class="confirm-overlay" id="confirm-overlay"><div class="confirm-box"><i class="fa-solid fa-circle-question" style="font-size: 70px; color: var(--primary); margin-bottom: 25px;"></i><h2 id="confirm-msg" style="margin-bottom: 35px; color: white;"></h2><div style="display:flex; gap:15px;"><button class="btn" style="background:rgba(255,255,255,0.1); flex:1;" onclick="window.cancelCallback()">ยกเลิก</button><button class="btn" style="background:var(--danger-grad); flex:1;" onclick="window.confirmCallback()">ตกลง</button></div></div></div>

    <div id="login-screen" class="auth-container glass">
        <i class="fa-solid fa-mobile-screen" style="font-size: 90px; color: var(--primary); margin-bottom: 25px;"></i>
        <h2 style="margin-bottom: 30px; font-size:2rem;">แอปพลิเคชันลูกหลาน</h2>
        <input type="text" id="login-id" placeholder="รหัสเครื่อง (ELDER_XXXX)">
        <input type="password" id="login-pass" placeholder="รหัสผ่านที่ตั้งไว้">
        <button class="btn" style="background: var(--success-grad); width: 100%; margin-bottom: 25px;" onclick="login()">เข้าสู่ระบบ</button>
        <button class="btn" style="background: rgba(255,255,255,0.08); width: 100%; border: 1px solid rgba(255,255,255,0.2);" onclick="startScanner()"><i class="fa-solid fa-camera"></i> เปิดกล้องสแกน QR</button>
        <div id="reader"></div>
    </div>

    <div id="paywall-screen" class="auth-container glass" style="border-color: var(--danger);">
        <i class="fa-solid fa-file-invoice-dollar" style="font-size: 90px; color: var(--danger);"></i>
        <h2 style="margin: 25px 0; color: white; font-size:2.5rem;">บัญชีถูกระงับ</h2>
        <p style="color: #94A3B8; font-size:1.2rem;">กรุณาติดต่อแอดมินเพื่อชำระค่าบริการ</p>
    </div>

    <div id="main-dashboard" class="container">
        <div class="glass" style="grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding: 25px 35px;">
            <div style="font-size: 1.3rem;"><i class="fa-solid fa-link" style="color:var(--primary);"></i> ควบคุมเครื่อง: <span id="display-target-id" style="font-weight: bold; color: var(--primary);"></span></div>
            <button class="btn" style="background: rgba(255,255,255,0.1);" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ</button>
        </div>

        <div id="sos-alert"><div><h2 style="margin-bottom: 5px; font-size:2rem;"><i class="fa-solid fa-triangle-exclamation"></i> ฉุกเฉินด่วน!</h2><p style="font-size:1.2rem;">ระบบดึงพิกัดแล้ว เช็คแผนที่!</p></div><button class="btn" style="background: white; color: var(--danger);" onclick="document.getElementById('sos-alert').style.display='none'">รับทราบ</button></div>
        <div id="geofence-alert"><span style="font-size:1.2rem;"><i class="fa-solid fa-person-walking-arrow-right"></i> เตือน! ออกนอกเขตปลอดภัย</span> <button class="btn" style="background: black; color: white; float: right;" onclick="document.getElementById('geofence-alert').style.display='none'">รับทราบ</button></div>

        <div style="display:flex; flex-direction:column; gap:30px;">
            <div class="card glass">
                <div class="card-title"><span><i class="fa-solid fa-microchip"></i> สถานะและพิกัด</span><span class="status-badge offline" id="online-status">ออฟไลน์</span></div>
                <div class="stat-grid">
                    <div class="stat-box"><span><i class="fa-solid fa-glass-water"></i> ดื่มน้ำ</span><span class="stat-value" id="stat-water">0</span></div>
                    <div class="stat-box"><span><i class="fa-solid fa-face-smile"></i> อารมณ์วันนี้</span><span class="stat-value" id="stat-mood" style="color:var(--warning); font-size:1.3rem;">ปกติ</span></div>
                </div>
                <label style="color:var(--primary); font-size:1.1rem;"><i class="fa-solid fa-map-location-dot"></i> ขอบเขตปลอดภัย (Geofence)</label>
                <div style="display: flex; gap: 15px; margin-bottom: 15px;"><input type="number" id="geo-radius" value="500" style="margin:0;"><button class="btn" style="background: var(--success-grad);" onclick="updateGeofence()">อัปเดต</button></div>
                <div id="map"></div>
                <div style="display:flex; gap:15px; margin-top:25px;">
                    <button class="btn" style="background: var(--primary-grad); flex:1;" onclick="findMyDevice()"><i class="fa-solid fa-magnifying-glass-location"></i> ค้นหาเครื่องผู้สูงอายุ</button>
                    <button class="btn" style="background: var(--danger-grad); flex:1;" onclick="toggleRemoteSiren()" id="btn-siren"><i class="fa-solid fa-bell-on"></i> เปิดไซเรน</button>
                </div>
            </div>

            <div class="card glass">
                <div class="card-title"><span><i class="fa-solid fa-clock-rotate-left"></i> ประวัติล่าสุด</span></div>
                <div class="log-container" id="activity-log"><div class="log-item"><div class="log-time">--:--</div><div class="log-msg" style="color:var(--sub);">ยังไม่มีประวัติ</div></div></div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:30px;">
            <div class="card glass">
                <div class="card-title"><span><i class="fa-solid fa-paper-plane"></i> แผงส่งข้อมูลไปที่จอ</span></div>
                <div class="form-group">
                    <label>🖼️ ส่งรูปภาพเข้าอัลบั้ม</label>
                    <div class="upload-btn-wrapper">
                        <button class="btn" style="background: linear-gradient(135deg, #D946EF, #C026D3); width:100%;"><i class="fa-solid fa-cloud-arrow-up"></i> เลือกรูปภาพส่งให้คุณตา</button>
                        <input type="file" id="image-upload" accept="image/jpeg, image/png" onchange="handleImageUpload(event)" />
                    </div>
                </div>
                <div class="form-group"><label><i class="fa-brands fa-youtube" style="color: #FF0000;"></i> ส่งลิ้งก์ YouTube</label><div style="display: flex; gap: 15px;"><input type="text" id="input-youtube" placeholder="วางลิงก์..."><button class="btn" style="background: #FF0000;" onclick="sendData('youtube', false)"><i class="fa-solid fa-play"></i></button></div></div>
            </div>

            <div class="card glass">
                <div class="card-title"><span><i class="fa-solid fa-calendar-check"></i> ระบบนัดหมายหมอ</span></div>
                <div class="list-manager">
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <input type="date" id="new-appoint-date" style="flex:1; margin:0;">
                        <input type="text" id="new-appoint-text" placeholder="ระบุ รพ. หรือ หมอ..." style="flex:2; margin:0;">
                    </div>
                    <button class="btn" style="background: var(--primary); width:100%; margin-bottom:20px;" onclick="addAppoint()"><i class="fa-solid fa-plus"></i> เพิ่มนัดหมาย</button>
                    <div id="admin-appoint-list"></div>
                    <button class="btn" style="background: rgba(255,255,255,0.1); width:100%; margin-top:15px;" onclick="syncAppointToDevice()">ส่งตารางนัดขึ้นจอ</button>
                </div>
            </div>

            <div class="card glass">
                <div class="card-title"><span><i class="fa-solid fa-pills"></i> ระบบจัดการยา (ระบุมื้อ)</span></div>
                <div class="list-manager">
                    <input type="text" id="new-pill" placeholder="ชื่อยา..." style="margin-bottom:10px;">
                    <div class="time-checks">
                        <label><input type="checkbox" id="chk-m"> เช้า</label>
                        <label><input type="checkbox" id="chk-n"> กลางวัน</label>
                        <label><input type="checkbox" id="chk-e"> เย็น</label>
                        <label><input type="checkbox" id="chk-b"> ก่อนนอน</label>
                    </div>
                    <button class="btn" style="background: var(--success); width:100%; margin-bottom:20px;" onclick="addPill()"><i class="fa-solid fa-plus"></i> เพิ่มยา</button>
                    <div id="admin-pill-list"></div>
                    <div style="display: flex; gap: 15px; margin-top: 25px;"><button class="btn" style="background: var(--success-grad); flex: 1;" onclick="syncPillsToDevice()"><i class="fa-solid fa-cloud-arrow-up"></i> ส่งตารางยา</button><button class="btn" style="background: #475569;" onclick="resetPillStatus()"><i class="fa-solid fa-rotate-right"></i> รีเซ็ตวันใหม่</button></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzph3otQ0ERZxWxwb8t-GrJbDeuzz9K4zMUCl4DpacNNItpZXX5OgoRKKwqfymLLn6fAw/exec";
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let TARGET_ID = localStorage.getItem('ELDER_TARGET_ID'), myTitle = "ผู้สูงอายุ";
        let html5QrCode, onlineTimer, map, marker, geoCircle;
        
        let adminPills = JSON.parse(localStorage.getItem('adminPills') || '[]');
        let adminAppoints = JSON.parse(localStorage.getItem('adminAppoints') || '[]'); // 🔴 อาร์เรย์นัดหมาย
        let logs = JSON.parse(localStorage.getItem('activityLogs') || '[]');
        let homeLat = 13.3155, homeLng = 100.9535, geoRadius = parseInt(localStorage.getItem('geoRadius') || 500);
        let sirenOn = false;

        function showToast(msg, type='info') { let box = document.getElementById('toast-container'); let el = document.createElement('div'); el.className = `toast ${type}`; let icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-circle-exclamation' : 'fa-bell'; el.innerHTML = `<i class="fa-solid ${icon}" style="font-size:1.5rem;"></i> <span style="font-size:1.1rem;">${msg}</span>`; box.appendChild(el); setTimeout(() => { el.style.animation = 'slideUpFade 0.4s forwards'; setTimeout(()=>el.remove(),400); }, 3500); }
        function customConfirm(msg, callback) { document.getElementById('confirm-msg').innerText = msg; const overlay = document.getElementById('confirm-overlay'); overlay.classList.add('show'); window.confirmCallback = () => { overlay.classList.remove('show'); callback(); }; window.cancelCallback = () => { overlay.classList.remove('show'); }; }
        function saveToCloud(payload) { const formData = new URLSearchParams(); formData.append('data', JSON.stringify(payload)); return fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: formData }); }

        window.onload = () => { if (TARGET_ID) checkProfileCloud(); document.getElementById('geo-radius').value = geoRadius; };

        async function login() {
            const id = document.getElementById('login-id').value, pass = document.getElementById('login-pass').value;
            if(!id || !pass) return showToast('กรอกให้ครบ', 'error');
            try { const res = await fetch(`${GAS_URL}?action=login&id=${id}&pass=${pass}`); const data = await res.json(); if(data.status === 'success') { TARGET_ID = id; localStorage.setItem('ELDER_TARGET_ID', id); checkProfileCloud(); showToast('เข้าสู่ระบบสำเร็จ!', 'success'); } else showToast(data.message, 'error'); } catch(e) { showToast('ขัดข้อง', 'error'); }
        }

        function startScanner() { document.getElementById('reader').style.display = "block"; html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, (decodedText) => { html5QrCode.stop().then(() => { document.getElementById('reader').style.display = "none"; document.getElementById('login-id').value = decodedText; showToast("สแกนสำเร็จ กรุณาใส่รหัสผ่าน", "success"); }); }, (err) => { }).catch((err) => { showToast("เปิดกล้องไม่ได้", "error"); }); }

        async function checkProfileCloud() {
            try {
                const res = await fetch(`${GAS_URL}?action=read&id=${TARGET_ID}`); const data = await res.json();
                if(data.status === "Suspended") { document.getElementById('login-screen').style.display = 'none'; document.getElementById('paywall-screen').style.display = 'block'; return; }
                localStorage.setItem('elderProfile_' + TARGET_ID, JSON.stringify(data)); initDashboard();
            } catch(e) { if(localStorage.getItem('elderProfile_' + TARGET_ID)) initDashboard(); }
        }

        function logout() { customConfirm("ยกเลิกการเชื่อมต่อ?", () => { localStorage.removeItem('ELDER_TARGET_ID'); localStorage.removeItem('elderProfile_' + TARGET_ID); location.reload(); }); }
        
        function addLog(msg) { const time = new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}); logs.unshift({time, msg}); if(logs.length > 20) logs.pop(); localStorage.setItem('activityLogs', JSON.stringify(logs)); renderLogs(); }
        function renderLogs() { const c = document.getElementById('activity-log'); if(logs.length === 0) return; c.innerHTML = logs.map(l => `<div class="log-item"><div class="log-time">${l.time}</div><div class="log-msg">${l.msg}</div></div>`).join(''); }

        function initDashboard() {
            document.getElementById('login-screen').style.display='none'; document.getElementById('main-dashboard').style.display='grid';
            document.getElementById('display-target-id').innerText = TARGET_ID;
            const p = JSON.parse(localStorage.getItem('elderProfile_' + TARGET_ID)); myTitle = p.title || "ผู้สูงอายุ";
            renderAdminPills(); renderAppoints(); renderLogs(); initMap(homeLat, homeLng);
            
            if(!client.connected) client.reconnect(); client.subscribe(`familycare/${TARGET_ID}/status/#`);

            client.on('message', (topic, message) => {
                const payload = message.toString(); const type = topic.split('/').pop();
                if(type === 'heartbeat') { document.getElementById('online-status').innerText = "ออนไลน์ 🟢"; document.getElementById('online-status').className = "status-badge online"; clearTimeout(onlineTimer); onlineTimer = setTimeout(() => { document.getElementById('online-status').innerText = "ออฟไลน์ 🔴"; document.getElementById('online-status').className = "status-badge offline"; }, 7000); }
                else if(type === 'water') { document.getElementById('stat-water').innerText = payload; addLog(`ดื่มน้ำ (${payload} แก้ว)`); }
                else if(type === 'battery') document.getElementById('stat-battery').innerText = payload;
                else if(type === 'mood') { document.getElementById('stat-mood').innerText = payload; addLog(`อารมณ์: ${payload}`); showToast(`${myTitle} ${payload}`, "info");}
                else if(type === 'pill_taken') { showToast(`${myTitle}ทาน ${payload} แล้ว`, "success"); addLog(`ทานยา: ${payload}`); adminPills.forEach(p => { if(p.name === payload) p.taken = true; }); localStorage.setItem('adminPills', JSON.stringify(adminPills)); renderAdminPills(); }
                else if(type === 'sos') { document.getElementById('sos-alert').style.display = 'flex'; new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg').play(); addLog(`🚨 กด SOS ขอความช่วยเหลือ!`); const data = JSON.parse(payload); if(data.lat) processLocation(data.lat, data.lng); }
                else if(type === 'location') { const data = JSON.parse(payload); if(data.lat) processLocation(data.lat, data.lng); }
            });
        }

        // 🔴 ระบบจัดการยาแบบระบุเวลา
        function renderAdminPills() { 
            const list = document.getElementById('admin-pill-list'); if(adminPills.length === 0) { list.innerHTML = '<span style="color:var(--sub);">ยังไม่มียาในระบบ</span>'; return; } 
            list.innerHTML = adminPills.map((p, i) => {
                let txt = []; if(p.m) txt.push("เช้า"); if(p.n) txt.push("เที่ยง"); if(p.e) txt.push("เย็น"); if(p.b) txt.push("นอน");
                return `<div class="list-item"><div><span style="color: ${p.taken ? 'var(--success)' : 'white'}; font-weight:600; font-size:1.1rem;">${p.taken ? '✔️' : '⏳'} ${p.name}</span><br><span style="font-size:0.8rem; color:var(--primary);">${txt.join(', ')}</span></div><button class="btn" style="background:rgba(239,68,68,0.2); padding: 12px;" onclick="removePill(${i})"><i class="fa-solid fa-trash" style="color:var(--danger);"></i></button></div>`;
            }).join(''); 
        }
        function addPill() { 
            const name = document.getElementById('new-pill').value; 
            const m = document.getElementById('chk-m').checked, n = document.getElementById('chk-n').checked, e = document.getElementById('chk-e').checked, b = document.getElementById('chk-b').checked;
            if(!name || (!m && !n && !e && !b)) return showToast("ใส่ชื่อยาและเลือกเวลาอย่างน้อย 1 มื้อ", "error"); 
            adminPills.push({ name, m, n, e, b, taken: false }); localStorage.setItem('adminPills', JSON.stringify(adminPills)); document.getElementById('new-pill').value = ""; renderAdminPills(); 
        }
        function removePill(i) { adminPills.splice(i, 1); localStorage.setItem('adminPills', JSON.stringify(adminPills)); renderAdminPills(); }
        function resetPillStatus() { adminPills.forEach(p => p.taken = false); localStorage.setItem('adminPills', JSON.stringify(adminPills)); renderAdminPills(); syncPillsToDevice(); showToast("รีเซ็ตเริ่มวันใหม่แล้ว", "success"); addLog("รีเซ็ตตารางยา"); }
        function syncPillsToDevice() { client.publish(`familycare/${TARGET_ID}/command/pills_update`, JSON.stringify(adminPills), { retain: true }); saveToCloud({ action: "updatePills", system_id: TARGET_ID, pills: JSON.stringify(adminPills) }); showToast("ส่งตารางยาสำเร็จ", "success"); }

        // 🔴 ระบบจัดการนัดหมาย
        function renderAppoints() {
            const list = document.getElementById('admin-appoint-list'); if(adminAppoints.length === 0) { list.innerHTML = ''; return; }
            list.innerHTML = adminAppoints.map((a, i) => `<div class="list-item"><div><span style="color:var(--primary); font-weight:bold;">${a.date}</span><br><span>${a.text}</span></div><button class="btn" style="background:rgba(239,68,68,0.2); padding: 10px;" onclick="removeAppoint(${i})"><i class="fa-solid fa-trash" style="color:var(--danger);"></i></button></div>`).join('');
        }
        function addAppoint() {
            const date = document.getElementById('new-appoint-date').value, text = document.getElementById('new-appoint-text').value;
            if(!date || !text) return showToast("ใส่วันที่และรายละเอียดให้ครบ", "error");
            adminAppoints.push({date, text}); localStorage.setItem('adminAppoints', JSON.stringify(adminAppoints));
            document.getElementById('new-appoint-text').value = ""; renderAppoints();
        }
        function removeAppoint(i) { adminAppoints.splice(i, 1); localStorage.setItem('adminAppoints', JSON.stringify(adminAppoints)); renderAppoints(); }
        function syncAppointToDevice() {
            client.publish(`familycare/${TARGET_ID}/command/appoint`, JSON.stringify(adminAppoints), { retain: true });
            saveToCloud({ action: "updateAppoint", system_id: TARGET_ID, appoint: JSON.stringify(adminAppoints) });
            showToast("ส่งตารางนัดสำเร็จ", "success");
        }

        // ส่งรูปและข้อมูลทั่วไป
        function handleImageUpload(event) {
            const file = event.target.files[0]; if(!file) return; showToast("กำลังประมวลผล...", "info");
            const reader = new FileReader(); reader.onload = (e) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX = 800; let w = img.width, h = img.height;
                    if (w > MAX) { h *= MAX / w; w = MAX; } canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                    client.publish(`familycare/${TARGET_ID}/command/photo`, canvas.toDataURL('image/jpeg', 0.6), { retain: true }); showToast("ส่งรูปขึ้นจอสำเร็จ!", "success"); addLog("อัปโหลดรูปภาพ");
                }; img.src = e.target.result;
            }; reader.readAsDataURL(file);
        }
        function sendData(type, isRetain) { const el = document.getElementById(`input-${type}`); const val = el.value; if(!val) return; client.publish(`familycare/${TARGET_ID}/command/${type}`, val, { retain: isRetain }); addLog(`ส่งคำสั่ง: ${type}`); el.value = ""; showToast("ส่งสำเร็จ!", "success"); }

        function findMyDevice() { client.publish(`familycare/${TARGET_ID}/command/find_device`, "start"); showToast("สั่งค้นหาเครื่องแล้ว", "success"); addLog(`ค้นหาเครื่อง`); }
        function toggleRemoteSiren() { const btn = document.getElementById('btn-siren'); if(sirenOn) { client.publish(`familycare/${TARGET_ID}/command/siren`, "stop"); btn.style.background = 'var(--danger-grad)'; btn.innerHTML = '<i class="fa-solid fa-bell-on"></i> เปิดไซเรน'; showToast("ปิดไซเรนแล้ว", "info"); } else { client.publish(`familycare/${TARGET_ID}/command/siren`, "start"); btn.style.background = 'rgba(255,255,255,0.1)'; btn.innerHTML = '<i class="fa-solid fa-bell-slash"></i> ปิดไซเรน'; showToast("สั่งเปิดไซเรน!", "error"); addLog(`🚨 สั่งเปิดไซเรน`); } sirenOn = !sirenOn; }
        
        function updateGeofence() { geoRadius = parseInt(document.getElementById('geo-radius').value); localStorage.setItem('geoRadius', geoRadius); if(geoCircle) geoCircle.setRadius(geoRadius); showToast(`ตั้งรัศมีเป็น ${geoRadius} ม.`, "success"); }
        function processLocation(lat, lng) { initMap(lat, lng); const R = 6371e3; const a = Math.sin((lat-homeLat)*Math.PI/360)**2 + Math.cos(homeLat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin((lng-homeLng)*Math.PI/360)**2; if(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) > geoRadius) { document.getElementById('geofence-alert').style.display = 'block'; new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play(); addLog(`⚠️ ออกนอกพื้นที่ปลอดภัย!`);} }
        function initMap(lat, lng) { if (!map) { map = L.map('map').setView([homeLat, homeLng], 15); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); geoCircle = L.circle([homeLat, homeLng], { color: 'green', fillColor: '#10B981', fillOpacity: 0.2, radius: geoRadius }).addTo(map); setTimeout(() => map.invalidateSize(), 500); } if(lat && lng) { map.setView([lat, lng], 16); if (marker) map.removeLayer(marker); marker = L.marker([lat, lng]).addTo(map).bindPopup("ตำแหน่งปัจจุบัน").openPopup(); } }
    </script>
</body>
</html>
