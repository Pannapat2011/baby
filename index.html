<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>จอคุณตา (Elderly Care)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --bg: #F8FAFC; --primary: #2563EB; --danger: #DC2626; --text: #0F172A; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; user-select: none; }
        body { background: var(--bg); color: var(--text); padding: 20px; padding-bottom: 150px; }

        /* นาฬิกาและหัวเว็บ */
        .header { text-align: center; margin-bottom: 30px; background: white; padding: 20px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .clock { font-size: 80px; font-weight: 900; color: var(--primary); line-height: 1; }
        
        /* ข้อมูลจากลูกหลาน */
        .info-box { background: #FEF3C7; border: 5px solid #F59E0B; padding: 25px; border-radius: 30px; margin-bottom: 25px; }
        .info-title { font-size: 28px; color: #B45309; font-weight: 800; margin-bottom: 10px; }
        .info-text { font-size: 36px; font-weight: 900; color: #78350F; line-height: 1.3; }

        .info-box.blue { background: #E0E7FF; border-color: #6366F1; }
        .info-box.blue .info-title { color: #4338CA; }
        .info-box.blue .info-text { color: #312E81; }

        /* ปุ่มกด */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-big { font-size: 32px; font-weight: 900; padding: 40px 20px; border-radius: 30px; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 15px; box-shadow: 0 12px 0 rgba(0,0,0,0.2); cursor: pointer; }
        .btn-big:active { transform: translateY(10px); box-shadow: none; }
        .btn-water { background: #0EA5E9; }
        .btn-pill { background: #10B981; }

        /* SOS ด้านล่าง */
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: white; border-top: 5px solid #E2E8F0; z-index: 100; }
        .btn-sos { width: 100%; font-size: 45px; font-weight: 900; padding: 30px; border-radius: 40px; border: none; background: var(--danger); color: white; box-shadow: 0 15px 0 #991B1B; }

        /* Overlays */
        .overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
        .alert-box { background: #F59E0B; padding: 50px; border-radius: 40px; width: 100%; max-width: 600px; }
        .alert-text { font-size: 50px; font-weight: 900; margin: 30px 0; line-height: 1.2; }
        .btn-close { font-size: 40px; padding: 20px 60px; border-radius: 30px; border: none; font-weight: 900; background: white; color: black; }
    </style>
</head>
<body>

    <div id="alert-overlay" class="overlay">
        <div class="alert-box">
            <i class="fa-solid fa-bullhorn fa-beat" style="font-size: 100px;"></i>
            <div class="alert-text" id="alert-msg">ข้อความ...</div>
            <button class="btn-close" onclick="closeAlert()">รับทราบ</button>
        </div>
    </div>

    <div id="video-overlay" class="overlay" style="padding:0; background: black;">
        <div id="jitsi-container" style="width: 100%; height: 100%;"></div>
    </div>

    <div class="header">
        <div class="clock" id="clock">00:00</div>
        <div style="font-size: 24px; color: #64748B; font-weight: 600;">แตะหน้าจอ 1 ครั้งเพื่อเปิดระบบเสียง</div>
    </div>

    <div class="info-box">
        <div class="info-title"><i class="fa-solid fa-pills"></i> ยาที่ต้องกินวันนี้</div>
        <div class="info-text" id="disp-pill">ยังไม่มีข้อมูลยา</div>
    </div>

    <div class="info-box blue">
        <div class="info-title"><i class="fa-regular fa-calendar-check"></i> นัดหมอครั้งถัดไป</div>
        <div class="info-text" id="disp-appoint">ยังไม่มีวันนัด</div>
    </div>

    <div class="grid">
        <button class="btn-big btn-water" onclick="drinkWater()">
            <i class="fa-solid fa-glass-water" style="font-size: 60px;"></i>
            <span>ดื่มน้ำ <br><small id="water-count" style="font-size:24px;">(0 แก้ว)</small></span>
        </button>
        <button class="btn-big btn-pill" onclick="takePill()">
            <i class="fa-solid fa-check-double" style="font-size: 60px;"></i>
            <span>กินยาแล้ว</span>
        </button>
    </div>

    <div class="bottom-bar">
        <button class="btn-sos" onclick="triggerSOS()"><i class="fa-solid fa-triangle-exclamation"></i> แจ้งเหตุฉุกเฉินด่วน</button>
    </div>

    <script>
        // ตั้งค่า MQTT (เปลี่ยน System ID ให้ตรงกัน)
        const SYSTEM_ID = "FAMILY_001"; 
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let waterCount = 0;
        let jitsiApi = null;

        // เริ่มต้นระบบ
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // แตะหน้าจอเพื่ออนุญาตเสียง
        document.body.addEventListener('click', () => {
            if(window.speechSynthesis) window.speechSynthesis.getVoices();
        }, {once:true});

        function speak(txt) {
            const msg = new SpeechSynthesisUtterance(txt);
            msg.lang = 'th-TH'; msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        // --- MQTT รับคำสั่งจากลูกหลาน ---
        client.on('connect', () => {
            client.subscribe(`familycare/${SYSTEM_ID}/command/#`);
            // ส่งสถานะออนไลน์ทุก 5 วิ
            setInterval(() => {
                client.publish(`familycare/${SYSTEM_ID}/status/heartbeat`, 'online');
            }, 5000);
        });

        client.on('message', (topic, message) => {
            const payload = message.toString();
            const action = topic.split('/').pop(); // อ่านค่าหลัง / สุดท้าย

            // 1. อัปเดตตารางยา
            if(action === 'pill') {
                document.getElementById('disp-pill').innerText = payload;
                speak("ลูกหลานอัปเดตตารางยาว่า " + payload);
            }
            // 2. อัปเดตนัดหมาย
            else if(action === 'appoint') {
                document.getElementById('disp-appoint').innerText = payload;
                speak("ลูกหลานอัปเดตนัดหมายว่า " + payload);
            }
            // 3. ข้อความเสียง/ประกาศ
            else if(action === 'alert') {
                document.getElementById('alert-msg').innerText = payload;
                document.getElementById('alert-overlay').style.display = 'flex';
                speak("ข้อความจากลูกหลาน: " + payload);
            }
            // 4. วีดีโอคอล
            else if(action === 'video') {
                if(payload === 'start') {
                    document.getElementById('video-overlay').style.display = 'flex';
                    speak("กำลังเชื่อมต่อวีดีโอคอลครับ");
                    jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", {
                        roomName: "Room_" + SYSTEM_ID,
                        parentNode: document.getElementById('jitsi-container'),
                        width: "100%", height: "100%"
                    });
                } else if(payload === 'stop') {
                    if(jitsiApi) jitsiApi.dispose();
                    document.getElementById('video-overlay').style.display = 'none';
                    speak("วางสายแล้วครับ");
                }
            }
        });

        // --- ปุ่มกดฝั่งคนแก่ ---
        function drinkWater() {
            waterCount++;
            document.getElementById('water-count').innerText = `(${waterCount} แก้ว)`;
            speak(`ดื่มน้ำแก้วที่ ${waterCount} แล้วครับ`);
            client.publish(`familycare/${SYSTEM_ID}/status/water`, waterCount.toString());
        }

        function takePill() {
            speak("บันทึกว่ากินยาเรียบร้อยแล้วครับ");
            client.publish(`familycare/${SYSTEM_ID}/status/pill_taken`, 'yes');
        }

        function closeAlert() {
            document.getElementById('alert-overlay').style.display = 'none';
        }

        function triggerSOS() {
            speak("กำลังส่งสัญญาณขอความช่วยเหลือ");
            client.publish(`familycare/${SYSTEM_ID}/status/sos`, 'EMERGENCY');
            alert("ส่งสัญญาณฉุกเฉินแล้ว! กรุณารอสักครู่");
        }
    </script>
</body>
</html>
