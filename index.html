<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์ควบคุม (GPS & Schedule PRO)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --primary: #3B82F6; --success: #10B981; --text: #F8FAFC; --danger: #EF4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .title { font-size: 20px; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #475569; background: #0F172A; color: white; margin-bottom: 10px; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; width: 100%; margin-bottom: 10px; }
        #map { height: 400px; border-radius: 15px; margin-top: 15px; border: 2px solid var(--danger); display: none; }
        .pill-item { background: #334155; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        #sos-banner { display: none; background: var(--danger); color: white; padding: 20px; border-radius: 15px; grid-column: span 3; animation: pulse 1s infinite; margin-bottom: 20px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div id="sos-banner">
        <h2 style="text-align: center;"><i class="fa-solid fa-location-dot"></i> ตรวจพบ SOS! พิกัดคุณตาปรากฏบนแผนที่แล้ว</h2>
    </div>

    <div class="container">
        <div class="card">
            <div class="title">สถานะคุณตา</div>
            <div style="font-size: 18px; margin-bottom: 15px;">เครื่อง: <span id="online-status" style="color:red">ออฟไลน์</span></div>
            <div style="font-size: 18px; margin-bottom: 15px;">น้ำที่ดื่ม: <span id="stat-water" style="color:var(--primary)">0</span> แก้ว</div>
            <div class="title" style="margin-top: 30px;">การสนทนา</div>
            <button class="btn" style="background: #8B5CF6;" onclick="startCall()"><i class="fa-solid fa-video"></i> เปิดกล้องด่วน</button>
            <button class="btn" style="background: #EF4444;" onclick="stopCall()">ตัดสาย</button>
        </div>

        <div class="card">
            <div class="title">พิกัด SOS & จัดการนัดหมาย</div>
            <div id="map"></div>
            <div style="margin-top: 25px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 15px;">
                <label>📍 ลงตารางนัดหมาย (วัน เวลา สถานที่)</label>
                <input type="text" id="input-appoint" placeholder="เช่น 20 เม.ย. 10:00น. - รพ.ชลบุรี (เช็คหัวใจ)">
                <button class="btn" style="background: var(--primary);" onclick="sendAppoint()">อัปเดตนัดหมายให้คุณตา</button>
            </div>
        </div>

        <div class="card">
            <div class="title">รายการยา</div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="new-pill" placeholder="ชื่อยา..." style="margin:0;">
                <button class="btn" style="background: var(--success); width: 80px;" onclick="addPill()">เพิ่ม</button>
            </div>
            <div id="pill-list" style="margin-top: 15px;"></div>
            <button class="btn" style="background: var(--success); margin-top: 10px;" onclick="syncPills()">ส่งตารางยา</button>
            <button class="btn" style="background: #475569;" onclick="resetPills()">รีเซ็ตเริ่มวันใหม่</button>
            
            <div class="title" style="margin-top: 30px;">ประกาศเสียง</div>
            <input type="text" id="input-alert" placeholder="พิมพ์ข้อความพูด...">
            <button class="btn" style="background: var(--warning); color: black;" onclick="sendAlert()">ส่งเสียงประกาศ</button>
        </div>
    </div>

    <script>
        const SYSTEM_ID = "FAMILY_001_VIP"; 
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        let map, marker, pills = JSON.parse(localStorage.getItem('adminPills') || '[]');

        function initMap(lat, lng) {
            document.getElementById('map').style.display = 'block';
            if (!map) {
                map = L.map('map').setView([lat, lng], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            } else { map.setView([lat, lng], 16); }
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lng]).addTo(map).bindPopup("คุณตาอยู่ที่นี่!").openPopup();
        }

        client.on('connect', () => client.subscribe(`familycare/${SYSTEM_ID}/status/#`));
        client.on('message', (topic, message) => {
            const payload = message.toString();
            const type = topic.split('/').pop();
            if(type === 'heartbeat') { document.getElementById('online-status').innerText = "ออนไลน์ 🟢"; document.getElementById('online-status').style.color = "#10B981"; }
            else if(type === 'water') document.getElementById('stat-water').innerText = payload;
            else if(type === 'food_request') alert("🍕 แจ้งเตือน: " + payload);
            else if(type === 'sos') {
                const data = JSON.parse(payload);
                if(data.lat) { document.getElementById('sos-banner').style.display = 'block'; initMap(data.lat, data.lng); }
                else { alert("🚨 SOS! แต่เครื่องไม่ส่งพิกัดมา"); }
            }
            else if(type === 'pill_taken') { alert(`✅ คุณตากิน ${payload} แล้ว`); pills.forEach(p => { if(p.name === payload) p.taken = true; }); renderPills(); }
        });

        function renderPills() {
            document.getElementById('pill-list').innerHTML = pills.map((p, i) => `
                <div class="pill-item">
                    <span>${p.taken ? '✔️' : '⏳'} ${p.name}</span>
                    <button onclick="removePill(${i})" style="background:none; border:none; color:red; cursor:pointer;">❌</button>
                </div>`).join('');
            localStorage.setItem('adminPills', JSON.stringify(pills));
        }
        function addPill() { const el = document.getElementById('new-pill'); if(el.value) { pills.push({name: el.value, taken:false}); el.value=""; renderPills(); } }
        function removePill(i) { pills.splice(i, 1); renderPills(); }
        function syncPills() { client.publish(`familycare/${SYSTEM_ID}/command/pills_update`, JSON.stringify(pills), {retain:true}); alert("ส่งตารางยาแล้ว"); }
        function resetPills() { pills.forEach(p => p.taken = false); renderPills(); syncPills(); }
        function sendAppoint() { const v = document.getElementById('input-appoint').value; client.publish(`familycare/${SYSTEM_ID}/command/appoint`, v, {retain:true}); alert("อัปเดตนัดหมายแล้ว"); }
        function sendAlert() { const v = document.getElementById('input-alert').value; client.publish(`familycare/${SYSTEM_ID}/command/alert`, v); }
        function startCall() { client.publish(`familycare/${SYSTEM_ID}/command/video`, 'start'); }
        function stopCall() { client.publish(`familycare/${SYSTEM_ID}/command/video', 'stop'); }
        renderPills();
    </script>
</body>
</html>
